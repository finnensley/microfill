name: Reconcile Stuck Webhook Events

on:
  schedule:
    # Every hour — resets webhook_events stuck in `processing`
    # back to `pending` so the queue worker can retry them.
    # Protects against silent data loss when a worker crashes mid-batch.
    - cron: "0 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Reset stuck processing events
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/queue/reconcile")

          echo "Response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Reconcile endpoint returned error status $HTTP_STATUS"
            exit 1
          fi
