name: Process Webhook Queue

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum interval.
    # Triggers the queue worker to claim and process pending webhook events.
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger queue worker
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/queue/process")

          echo "Response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Queue worker returned error status $HTTP_STATUS"
            exit 1
          fi
