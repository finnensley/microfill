name: Route Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  vitest-routes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run focused route validation
        run: npm run test:routes
